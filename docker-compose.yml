version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: eventsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-eventsphere_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eventsphere}
      MYSQL_USER: ${MYSQL_USER:-eventsphere_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eventsphere_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      # Persist MySQL data
      - mysql_data:/var/lib/mysql
      # Initialize database with schema
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-eventsphere_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Tomcat Application Service
  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventsphere-tomcat
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database connection settings
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-eventsphere}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-eventsphere_root_2026}
      # JVM settings
      CATALINA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/EventSphere/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Docker Networks
networks:
  eventsphere-network:
    driver: bridge
    name: eventsphere-network

# Docker Volumes
volumes:
  mysql_data:
    driver: local
    name: eventsphere-mysql-data
